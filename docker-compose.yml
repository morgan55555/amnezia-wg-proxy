services:
  amnezia-wg-proxy:
    image: ghcr.io/morgan55555/amnezia-wg-proxy:latest
    container_name: amnezia-wg-proxy
    volumes:
      - /test/config/directory:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 5000:5000
      - 5000:5000/udp
    stdin_open: true
    tty: true
